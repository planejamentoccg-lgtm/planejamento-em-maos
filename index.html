<!DOCTYPE html>
<html>
<head>
  <title>Planejamento em Mãos</title>
</head>
<body>

<h1>Login</h1>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="senha" placeholder="Senha"><br><br>

<button onclick="login()">Entrar</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {

    const userCredential = await auth.signInWithEmailAndPassword(email, senha);
    const user = userCredential.user;

    // 🔐 fingerprint do dispositivo
    const device = navigator.userAgent + screen.width + screen.height;

    const ref = db.collection("users_devices").doc(user.uid);
    const docSnap = await ref.get();

    if (!docSnap.exists) {

      // ✅ PRIMEIRO LOGIN DO USUÁRIO
      await ref.set({
        device: device,
        createdAt: new Date().toISOString()
      });

      alert("✅ Dispositivo registrado");

    } else {

      const data = docSnap.data();

      if (data.device !== device) {
        alert("🚫 Acesso bloqueado: dispositivo diferente");
        return;
      }

      alert("✅ Login autorizado");

    }

  } catch (e) {
    alert("Erro: " + e.message);
    console.log(e);
  }

}

</script>

</body>
</html>
