<!DOCTYPE html>
<html>
<head>
  <title>Planejamento em Mãos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
    }

    #app.blur {
      filter: blur(10px);
    }

    #lista button {
      display: block;
      width: 300px;
      margin: 10px auto;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
      border: 1px solid #ccc;
      background: #f5f5f5;
    }

    #detalhe {
      display: none;
      padding: 20px;
    }

    img {
      max-width: 90%;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1>Login</h1>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="senha" placeholder="Senha"><br><br>

  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <h1>Frentes de Serviço</h1>

  <div id="lista"></div>

  <div id="detalhe">
    <h2 id="nome"></h2>

    <img id="imagem">

    <p id="data"></p>
    <p id="total"></p>
    <p id="avanco"></p>

    <br>
    <button onclick="voltar()">Voltar</button>
  </div>

</div>

<!-- ✅ FIREBASE CORRETO -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// ✅ LOGIN
async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {

    const userCredential = await auth.signInWithEmailAndPassword(email, senha);
    const user = userCredential.user;

    const device = navigator.userAgent;

    const ref = db.collection("users_devices").doc(user.uid);
    const docSnap = await ref.get();

    if (!docSnap.exists) {
      await ref.set({ device: device });
    } else {
      if (docSnap.data().device !== device) {
        alert("🚫 Dispositivo bloqueado");
        return;
      }
    }

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    carregarFrentes();

  } catch (e) {
    alert(e.message);
  }
}


// ✅ CARREGAR LISTA
async function carregarFrentes() {

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const snapshot = await db.collection("Frentes").get();

  snapshot.forEach(doc => {

    const data = doc.data();

    const btn = document.createElement("button");

    btn.innerText = data.Nome;

    btn.onclick = () => abrirDetalhe(data);

    lista.appendChild(btn);

  });

}


// ✅ DETALHE (COM CORREÇÃO DA IMAGEM)
function abrirDetalhe(data) {

  document.getElementById("lista").style.display = "none";
  document.getElementById("detalhe").style.display = "block";

  document.getElementById("nome").innerText = data.Nome;

  const img = document.getElementById("imagem");

  // fallback se não carregar
  img.onerror = function () {
    img.src = "https://via.placeholder.com/400x300?text=Imagem+não+carregou";
  };

  // força atualização da imagem
  img.src = "";
  setTimeout(() => {
    img.src = data.Imagem;
  }, 100);

  document.getElementById("data").innerText = "Data: " + data["Data Prevista"];
  document.getElementById("total").innerText = "Total: " + data.Total;
  document.getElementById("avanco").innerText = "Avanço: " + data["Avanço"];

}


// ✅ VOLTAR
function voltar() {

  document.getElementById("lista").style.display = "block";
  document.getElementById("detalhe").style.display = "none";

}


// ✅ BLUR
document.addEventListener("visibilitychange", () => {
  const app = document.getElementById("app");

  if (document.hidden) {
    app.classList.add("blur");
  } else {
    app.classList.remove("blur");
  }
});

</script>

</body>
</html>
