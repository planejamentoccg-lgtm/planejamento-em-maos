<!DOCTYPE html>
<html>
<head>
  <title>Planejamento em Mãos</title>

  <!-- RESPONSIVO -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ FONTE LATO -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- ✅ FIREBASE (CORRETO) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
      background: #f4f6f8;
      text-align: center;
    }

    #topo {
      display: flex;
      align-items: center;
      background: #fff;
      padding: 10px 20px;
    }

    #topo img {
      height: 50px;
    }

    #topo h2 {
      margin-left: 10px;
    }

    #banner {
      height: 200px;
      background-size: cover;
      background-position: center;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
    }

    #lista button {
      display: block;
      width: 300px;
      margin: 10px auto;
      padding: 10px;
      cursor: pointer;
    }

    .bloco {
      padding: 20px;
      border-bottom: 1px solid #ddd;
    }

    @media (max-width: 768px) {
      #lista button {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="email" type="email"><br><br>
  <input id="senha" type="password"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div id="lista"></div>

  <div id="detalhe" style="display:none;">

    <div id="topo">
      <img src="https://i.imgur.com/iZ8gr1i.png">
      <h2>Planejamento em Mãos</h2>
    </div>

    <div id="banner">
      <span id="titulo"></span>
    </div>

    <div id="conteudo"></div>

    <button onclick="voltar()">Voltar</button>

  </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// ✅ LOGIN
async function login() {

  const email = email.value;
  const senha = senha.value;

  try {
    const cred = await auth.signInWithEmailAndPassword(email, senha);
    const user = cred.user;

    const device = navigator.userAgent;

    const ref = db.collection("users_devices").doc(user.uid);
    const snap = await ref.get();

    if (!snap.exists) {
      await ref.set({ device });
    } else if (snap.data().device !== device) {
      alert("🚫 Bloqueado em outro dispositivo");
      await auth.signOut();
      return;
    }

    login.style.display = "none";
    app.style.display = "block";

    carregar();

  } catch (e) {
    alert(e.message);
  }
}


// ✅ LISTAR
async function carregar() {

  lista.innerHTML = "<h2>Frentes</h2>";

  const snap = await db.collection("Frentes").get();

  snap.forEach(doc => {

    const data = doc.data();

    const btn = document.createElement("button");
    btn.innerText = data.Nome;
    btn.onclick = () => abrir(data);

    lista.appendChild(btn);
  });
}


// ✅ CRIA SEÇÃO
function secao(s, nome) {

  if (!s) return "";

  let h = `<div class="bloco"><h3>${nome}</h3>`;

  if (s["Data Prevista"]) h += `<p>${s["Data Prevista"]}</p>`;
  if (s.Total) h += `<p>Total: ${s.Total}</p>`;
  if (s["Avanço"]) h += `<p>Avanço: ${s["Avanço"]}</p>`;
  if (s.Situacao) h += `<p>${s.Situacao}</p>`;

  if (s.Imagem1) h += `<img src="${s.Imagem1 abrir(data) {

  lista.style.display = "none";
  detalhe.style.display = "block";

  titulo.innerText = data.Nome;

  banner.style.backgroundImage = `url('${data.Imagem}')`;

  conteudo.innerHTML =
    secao(data.LadoSul, "LADO SUL") +
    secao(data.LadoOeste, "LADO OESTE");
}


// ✅ VOLTAR
function voltar() {
  lista.style.display = "block";
  detalhe.style.display = "none";
}

</script>

</body>
</html>
