<!DOCTYPE html>
<html>
<head>
  <title>Planejamento em Mãos</title>

  <style>
    body.blur {
      filter: blur(10px);
    }

    body {
      transition: filter 0.3s ease;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h1>Login</h1>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="senha" placeholder="Senha"><br><br>

  <button onclick="login()">Entrar</button>
</div>

<!-- SISTEMA -->
<div id="sistema" style="display:none;">
  <h1>Bem-vindo ao Sistema 🚀</h1>
  <p>Você está logado.</p>
</div>

<!-- FIREBASE (CORRIGIDO ✅) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// ✅ LOGIN
async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {

    const userCredential = await auth.signInWithEmailAndPassword(email, senha);
    const user = userCredential.user;

    const device = navigator.userAgent + screen.width + screen.height;

    const ref = db.collection("users_devices").doc(user.uid);

    let autorizado = true;

    try {
      const docSnap = await ref.get();

      if (!docSnap.exists) {
        await ref.set({ device: device });
      } else {
        const data = docSnap.data();

        if (data.device !== device) {
          alert("🚫 Dispositivo bloqueado");
          autorizado = false;
        }
      }

    } catch (erroBanco) {
      console.log("Erro no banco:", erroBanco);
      alert("⚠️ Falha no banco (seguindo login)");
    }

    if (!autorizado) return;

    // ✅ TROCA DE TELA
    document.getElementById("login").style.display = "none";
    document.getElementById("sistema").style.display = "block";

  } catch (e) {
    alert("Erro: " + e.message);
  }
}


// 🧊 BLUR PROFISSIONAL (melhor possível no web)

function ativarBlur() {
  document.body.classList.add("blur");
}

function removerBlur() {
  document.body.classList.remove("blur");
}

// computador (troca de aba)
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    ativarBlur();
  } else {
    removerBlur();
  }
});

// foco geral
window.addEventListener("blur", ativarBlur);
window.addEventListener("focus", removerBlur);

// eventos extras (mobile compat)
window.addEventListener("pagehide", ativarBlur);
window.addEventListener("pageshow", removerBlur);

// fallback (garantia)
setInterval(() => {
  if (!document.hasFocus()) {
    ativarBlur();
  }
}, 1500);

</script>

</body>
</html>
