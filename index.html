<!DOCTYPE html>
<html>
<head>
  <title>Planejamento em Mãos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      transition: filter 0.3s;
    }

    #app.blur {
      filter: blur(10px);
    }

    #watermark {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.12;
      font-size: 14px;
      color: rgba(0,0,0,0.3);
      white-space: pre-wrap;
      display: none;
    }
  </style>
</head>

<body>

<div id="app">

  <div id="login">
    <h1>Login</h1>

    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="password" id="senha" placeholder="Senha"><br><br>

    <button onclick="login()">Entrar</button>
  </div>

  <div id="sistema" style="display:none;">
    <h1>Bem-vindo 🚀</h1>
    <p>Sistema ativo</p>
  </div>

</div>

<div id="watermark"></div>

<!-- ✅ SCRIPT CORRETO -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {

    const userCredential = await auth.signInWithEmailAndPassword(email, senha);
    const user = userCredential.user;

    const device = navigator.userAgent + screen.width + screen.height;

    const ref = db.collection("users_devices").doc(user.uid);

    let autorizado = true;

    try {
      const docSnap = await ref.get();

      if (!docSnap.exists) {
        await ref.set({ device: device });
      } else {
        const data = docSnap.data();

        if (data.device !== device) {
          alert("🚫 Dispositivo bloqueado");
          autorizado = false;
        }
      }

    } catch {}

    if (!autorizado) return;

    // ✅ TROCA DE TELA
    document.getElementById("login").style.display = "none";
    document.getElementById("sistema").style.display = "block";

    // ✅ WATERMARK (FORÇADA)
    const watermark = document.getElementById("watermark");
    watermark.style.display = "block";

    let texto = email + " | " + new Date().toLocaleString();
    let linhas = "";

    for (let i = 0; i < 80; i++) {
      linhas += texto + "\n";
    }

    watermark.innerText = linhas;

  } catch (e) {
    alert("Erro: " + e.message);
  }
}


// ✅ BLUR MELHORADO
function ativarBlur() {
  document.getElementById("app").classList.add("blur");
}

function removerBlur() {
  document.getElementById("app").classList.remove("blur");
}

document.addEventListener("visibilitychange", () => {
  if (document.hidden) ativarBlur();
  else removerBlur();
});

window.addEventListener("blur", ativarBlur);
window.addEventListener("focus", removerBlur);
window.addEventListener("pagehide", ativarBlur);
window.addEventListener("pageshow", removerBlur);

setInterval(() => {
  if (!document.hasFocus()) ativarBlur();
}, 800);

</script>

</body>
</html>
