<!DOCTYPE html>
<html>
<head>
  <title>Planejamento em Mãos</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONTE LATO -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
      background: #f4f6f8;
      text-align: center;
    }

    #topo {
      display: flex;
      align-items: center;
      background: #fff;
      padding: 10px 20px;
      border-bottom: 1px solid #ddd;
    }

    #topo img {
      height: 50px;
    }

    #topo h2 {
      margin-left: 15px;
      color: #2c3e50;
      font-weight: 400;
    }

    #banner {
      height: 240px;
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 36px;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    }

    #lista button {
      display: block;
      width: 300px;
      margin: 10px auto;
      padding: 12px;
      background: #1f6e8c;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #detalhe {
      display: none;
    }

    .bloco {
      padding: 25px;
      border-bottom: 1px solid #ddd;
    }

    .tituloSecao {
      color: #1f6e8c;
      font-size: 22px;
    }

    .tituloVerde {
      color: #2ecc71;
      font-weight: bold;
      margin-top: 10px;
    }

    img {
      max-width: 90%;
      margin: 10px 0;
      border-radius: 8px;
    }

    button {
      margin: 20px;
      padding: 10px 20px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      #banner {
        height: 160px;
        font-size: 24px;
      }

      #topo img {
        height: 40px;
      }

      #lista button {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1>Login</h1>
  <input type="email" id="email"><br><br>
  <input type="password" id="senha"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div id="lista"></div>

  <div id="detalhe">

    <div id="topo">
      <img src="https://i.imgur.com/iZ8gr1i.png">
      <h2>Planejamento em Mãos</h2>
    </div>

    <div id="banner">
      <span id="titulo"></span>
    </div>

    <div id="conteudoSecoes"></div>

    <button onclick="voltar()">Voltar</button>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();


// LOGIN COM BLOQUEIO
async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {

    const userCredential = await auth.signInWithEmailAndPassword(email, senha);
    const user = userCredential.user;

    const device = navigator.userAgent + screen.width + screen.height;

    const ref = db.collection("users_devices").doc(user.uid);
    const docSnap = await ref.get();

    if (!docSnap.exists) {
      await ref.set({ device });
    } else if (docSnap.data().device !== device) {
      alert("🚫 Usuário vinculado a outro dispositivo");
      await auth.signOut();
      return;
    }

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    carregarFrentes();

  } catch (e) {
    alert(e.message);
  }
}


// LISTAR FRENTES
async function carregarFrentes() {

  const lista = document.getElementById("lista");
  lista.innerHTML = "<h2>Frentes</h2>";

  const snapshot = await db.collection("Frentes").get();

  snapshot.forEach(doc => {

    const data = doc.data();

    const btn = document.createElement("button");
    btn.innerText = data.Nome;
    btn.onclick = () => abrirDetalhe(data);

    lista.appendChild(btn);
  });
}


// CRIAR BLOCO SEM UNDEFINED
function criarSecao(secao, titulo) {

  if (!secao) return "";

  let html = `<div class="bloco">`;

  html += `<h2 class="tituloSecao">${titulo}</h2>`;

  if (secao["Data Prevista"]) html += `<p>${secao["Data Prevista"]}</p>`;
  if (secao.Total) html += `<p>Total: ${secao.Total}</p>`;
  if (secao["Avanço"]) html += `<p>Avanço: ${secao["Avanço"]}</p>`;

  if (secao.Situacao) html += `<div class="tituloVerde">${secao.Situacao}</div>`;

  if (secao.Inicio || secao.Previsto || secao.Realizado) {
    html += `<h3>Previsto x Realizado</h3>`;
    if (secao.Inicio) html += `<p>${secao.Inicio}</p>`;
    if (secao.Previsto) html += `<p>${secao.Previsto}</p>`;
    if (secao.Realizado) html += `<p>${secao.Realizado}</p>`;
  }

  if (secao.Grafico) html += `<img src="${secao.Grafico}ao.Imagem(secao.Imagem3) html += `<img src="${secao.Imagem3} += `</div>`;

  return html;
}


// ABRIR DETALHE
function abrirDetalhe(data) {

  document.getElementById("lista").style.display = "none";
  document.getElementById("detalhe").style.display = "block";

  document.getElementById("titulo").innerText = data.Nome || "";

  document.getElementById("banner").style.backgroundImage =
    "url('" + data.Imagem + "')";

  let html = "";
  html += criarSecao(data.LadoSul, "LADO SUL");
  html += criarSecao(data.LadoOeste, "LADO OESTE");

  document.getElementById("conteudoSecoes").innerHTML = html;
}


// VOLTAR
function voltar() {
  document.getElementById("lista").style.display = "block";
  document.getElementById("detalhe").style.display = "none";
}

</script>

</body>
</html>
