<!DOCTYPE html>
<html>
<head>
  <title>Planejamento em Mãos</title>
</head>
<body>

<div id="login">
  <h1>Login</h1>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="senha" placeholder="Senha"><br><br>

  <button onclick="login()">Entrar</button>
</div>

<div id="sistema" style="display:none;">
  <h1>Bem-vindo ao Sistema 🚀</h1>
  <p>Você está logado!</p>
</div>

<div id="watermark"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {

    const userCredential = await auth.signInWithEmailAndPassword(email, senha);
    const user = userCredential.user;

    const device = navigator.userAgent + screen.width + screen.height;

    const ref = db.collection("users_devices").doc(user.uid);

    let autorizado = true;

    try {
      const docSnap = await ref.get();

      if (!docSnap.exists) {
        await ref.set({ device: device });
      } else {
        const data = docSnap.data();

        if (data.device !== device) {
          alert("🚫 Dispositivo bloqueado");
          autorizado = false;
        }
      }

    } catch (erroBanco) {
      console.log("Erro no banco:", erroBanco);
      alert("⚠️ Banco falhou, mas login continuará (modo seguro)");
    }

    if (!autorizado) return;

    // ✅ FORÇAR TROCA DE TELA
    const loginDiv = document.getElementById("login");
    const sistemaDiv = document.getElementById("sistema");

    if (loginDiv && sistemaDiv) {
      loginDiv.style.display = "none";
      sistemaDiv.style.display = "block";
    } else {
      alert("Erro ao carregar sistema");
    }

    // ✅ MARCA D'ÁGUA
    const watermark = document.getElementById("watermark");
    watermark.innerText = email + " | " + new Date().toLocaleString();

    watermark.style.position = "fixed";
    watermark.style.top = "0";
    watermark.style.left = "0";
    watermark.style.width = "100%";
    watermark.style.height = "100%";
    watermark.style.opacity = "0.08";
    watermark.style.fontSize = "28px";
    watermark.style.display = "flex";
    watermark.style.alignItems = "center";
    watermark.style.justifyContent = "center";
    watermark.style.transform = "rotate(-30deg)";
    watermark.style.pointerEvents = "none";

  } catch (e) {
    alert("Erro: " + e.message);
  }
}

// blur
document.addEventListener("visibilitychange", () => {
  document.body.style.filter = document.hidden ? "blur(8px)" : "none";
});

</script>

</body>
</html>
