<!DOCTYPE html>
<html>
<head>
  <title>Planejamento em Mãos</title>

  <!-- ✅ FONTE LATO -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
      text-align: center;
      background: #f4f6f8;
    }

    #app.blur {
      filter: blur(8px);
    }

    /* ✅ TOPO */
    #topo {
      display: flex;
      align-items: center;
      background: #ffffff;
      padding: 10px 20px;
      border-bottom: 1px solid #ddd;
    }

    #topo img {
      height: 50px;
    }

    #topo h2 {
      margin-left: 15px;
      font-weight: 400;
      color: #2c3e50;
      font-size: 22px;
    }

    /* ✅ BANNER */
    #banner {
      height: 250px;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 42px;
      font-weight: 300;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    }

    /* ✅ LISTA */
    #lista button {
      display: block;
      width: 300px;
      margin: 10px auto;
      padding: 12px;
      cursor: pointer;
      background: #1f6e8c;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    /* ✅ DETALHE */
    #detalhe {
      display: none;
    }

    .bloco {
      padding: 25px;
    }

    .tituloAzul {
      color: #1f6e8c;
      font-size: 22px;
    }

    .tituloVerde {
      color: #2ecc71;
      font-size: 20px;
      font-weight: bold;
    }

    p {
      margin: 6px;
      font-size: 16px;
    }

    img {
      max-width: 90%;
      border-radius: 8px;
      margin: 15px 0;
    }

    button {
      margin: 20px;
      padding: 10px 20px;
      background: #2c3e50;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1>Login</h1>
  <input type="email" id="email"><br><br>
  <input type="password" id="senha"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- 🔥 LISTA -->
  <div id="lista"></div>

  <!-- 🔥 DETALHE -->
  <div id="detalhe">

    <!-- ✅ TOPO COM LOGO -->
    <div id="topo">
      <img id="logo" src="LINK_DA_SUA_LOGO_AQUI">
      <h2>Planejamento em Mãos</h2>
    </div>

    <!-- ✅ BANNER -->
    <div id="banner">
      <span id="titulo"></span>
    </div>

    <!-- ✅ DADOS -->
    <div class="bloco">
      <h3 class="tituloAzul">Dados</h3>
      <p id="data"></p>
      <p id="total"></p>
      <p id="avanco"></p>
    </div>

    <!-- ✅ SITUAÇÃO -->
    <div class="bloco">
      <h3 class="tituloVerde" id="situacao"></h3>
    </div>

    <!-- ✅ PREVISTO -->
    <div class="bloco">
      <h3 class="tituloAzul">Previsto x Realizado</h3>
      <p id="inicio"></p>
      <p id="previsto"></p>
      <p id="realizado"></p>
      <img id="grafico">
    </div>

    <!-- ✅ IMAGENS -->
    <div class="bloco">
      <img id="img1">
      <img id="img2">
      <img id="img3">
    </div>

    <button onclick="voltar()">Voltar</button>

  </div>

</div>

<!-- ✅ FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// ✅ LOGIN
async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {

    const userCredential = await auth.signInWithEmailAndPassword(email, senha);
    const user = userCredential.user;

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    carregarFrentes();

  } catch (e) {
    alert(e.message);
  }
}


// ✅ LISTAR FRENTES
async function carregarFrentes() {

  const lista = document.getElementById("lista");
  lista.innerHTML = "<h1>Frentes de Serviço</h1>";

  const snapshot = await db.collection("Frentes").get();

  snapshot.forEach(doc => {

    const data = doc.data();

    const btn = document.createElement("button");
    btn.innerText = data.Nome;
    btn.onclick = () => abrirDetalhe(data);

    lista.appendChild(btn);
  });
}


// ✅ ABRIR DETALHE
function abrirDetalhe(data) {

  document.getElementById("lista").style.display = "none";
  document.getElementById("detalhe").style.display = "block";

  document.getElementById("titulo").innerText = data.Nome;

  document.getElementById("banner").style.backgroundImage =
    "url('" + data.Imagem + "')";

  document.getElementById("data").innerText = data["Data Prevista"];
  document.getElementById("total").innerText = "Total: " + data.Total;
  document.getElementById("avanco").innerText = "Avanço: " + data["Avanço"];

  document.getElementById("situacao").innerText = data.Situacao || "";

  document.getElementById("inicio").innerText = data.Inicio || "";
  document.getElementById("previsto").innerText = data.Previsto || "";
  document.getElementById("realizado").innerText = data.Realizado || "";

  document.getElementById("grafico").src = data.Grafico || "";
  document.getElementById("img1").src = data.Imagem1 || "";
  document.getElementById("img2").src = data.Imagem2 || "";
  document.getElementById("img3").src = data.Imagem3 || "";
}


// ✅ VOLTAR
function voltar() {
  document.getElementById("lista").style.display = "block";
  document.getElementById("detalhe").style.display = "none";
}

</script>

</body>
</html>
